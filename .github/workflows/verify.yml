name: Verify library

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm run build:min
      - run: npm run manifest
      - run: npm test
      - run: git diff --exit-code -- p5.gysin.min.js docs/p5.gysin.manifest.json
